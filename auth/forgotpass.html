<!DOCTYPE html>
<html lang="eng">

<head>
  <title>Forgot Password Technilog</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../stylesheet/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-white">
  <div class="min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md p-8 rounded-xl shadow-lg text-white" style="background-color: var(--color-secondary);">

      <!-- LOGO -->
      <div class="flex flex-col items-center mb-6">
        <img src="../image/logo.png" class="h-20 w-20 rounded-full mb-3" alt="Logo" onerror="this.style.display='none'">
        <h1 class="text-3xl font-bold tracking-wide">TECHNILOG</h1>
        <p class="text-sm mt-1 text-white/70">Reset your password</p>
      </div>

      <!-- MESSAGE -->
      <div id="msgBox" class="hidden mb-4 py-2 px-3 rounded-lg text-center text-sm"></div>

      <!-- EMAIL -->
      <div class="mb-4">
        <label class="block text-sm mb-1 text-white/80">Email</label>
        <input type="email" id="email" placeholder="Enter your registered email"
          class="w-full px-4 py-2 rounded-lg text-black outline-none focus:ring-2 focus:ring-white/40">
      </div>

      <!-- SEND CODE BUTTON -->
      <button id="sendCodeBtn"
        class="w-full py-2 rounded-lg font-semibold bg-white text-black hover:bg-gray-200 transition mb-4">
        Send Verification Code
      </button>

      <!-- LOGIN LINK -->
      <p class="text-center text-sm text-white/70">
        Remember your password?
        <a href="login.html" class="font-semibold text-white hover:underline">Log In</a>
      </p>

      <div class="text-center text-xs mt-6 text-white/40">© 2026 TECHNILOG. All rights reserved.</div>
    </div>
  </div>

  <script src="../js/forgotPass.js"></script>
</body>

</html>
