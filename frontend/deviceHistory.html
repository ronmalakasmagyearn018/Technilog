<!DOCTYPE html>
<html lang="en">
<head>
  <title>Device History Technilog</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../stylesheet/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn .3s ease both; }
    @keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:.4} }
    .pulse-dot { animation: pulseDot 2s infinite; }
    @keyframes modalIn { from{opacity:0;transform:scale(.96) translateY(12px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-in { animation: modalIn .25s cubic-bezier(.4,0,.2,1) both; }
  </style>
</head>
<body class="bg-[#f0f2f8] min-h-screen flex flex-col font-[Arial,sans-serif]">

<!-- HEADER -->
<header class="fixed top-0 left-0 w-full z-50 shadow-md" style="background:var(--color-primary);">
  <div class="max-w-5xl mx-auto flex items-center h-[56px] px-3 md:px-4 gap-2 md:gap-4">
    <a href="main.html" class="flex items-center gap-2">
      <img src="../image/logo.png" alt="Logo" class="h-10 rounded-full">
      <span class="text-white font-bold text-sm md:text-lg tracking-wide">TECHNILOG</span>
    </a>
    <div class="hidden sm:block mx-2 h-5 w-px bg-white/30"></div>
    <span class="text-white font-semibold text-sm md:text-lg hidden sm:block"><i class="fas fa-clock-rotate-left mr-1 md:mr-2"></i>Device History</span>
    <div class="ml-auto">
      <a href="main.html" class="text-white/80 hover:text-white text-sm transition">
        <i class="fas fa-arrow-left mr-1"></i>Back to Homepage
      </a>
    </div>
  </div>
</header>

<div class="h-16"></div>

<div class="flex-1">
  <div class="max-w-5xl mx-auto px-4 py-6">

    <!-- Page heading -->
    <div class="flex items-start justify-between mb-1 flex-wrap gap-2">
      <div>
        <h1 class="text-2xl font-extrabold text-gray-800">Device History</h1>
        <p class="text-gray-400 text-sm mt-0.5">All power on/off events for your smart devices</p>
      </div>
      <button onclick="loadHistory()" class="flex items-center gap-1.5 text-xs font-bold px-4 py-2 rounded-xl border-0 cursor-pointer transition-all text-white shadow-sm" style="background:var(--color-primary);">
        <i class="fas fa-rotate-right"></i> Refresh
      </button>
    </div>

    <!-- Summary chips -->
    <div id="summaryBar" class="hidden flex-wrap gap-3 my-5"></div>

    <!-- Filters -->
    <div class="flex flex-wrap gap-3 mb-5">
      <div class="relative flex-1 min-w-[180px]">
        <i class="fas fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
        <input id="searchInput" type="text" placeholder="Search model, category..."
          oninput="applyFilters()"
          class="w-full bg-white rounded-xl pl-8 pr-4 py-2.5 text-sm border-0 shadow-sm outline-none focus:ring-2 text-gray-700"
          style="--tw-ring-color:var(--color-secondary);">
      </div>
      <select id="actionFilter" onchange="applyFilters()"
        class="bg-white rounded-xl px-4 py-2.5 text-sm border-0 shadow-sm text-gray-700 cursor-pointer outline-none">
        <option value="">All Actions</option>
        <option value="turned_off">Turned Off</option>
        <option value="turned_on">Turned On</option>
        <option value="alert_fire">Fire Alert</option>
        <option value="alert_burglar">Burglar Alert</option>
      </select>
      <select id="catFilter" onchange="applyFilters()"
        class="bg-white rounded-xl px-4 py-2.5 text-sm border-0 shadow-sm text-gray-700 cursor-pointer outline-none">
        <option value="">All Categories</option>
        <option value="Smart CCTV Camera">CCTV Camera</option>
        <option value="Smart Fire Alarm">Fire Alarm</option>
      </select>
    </div>

    <!-- Timeline -->
    <div id="historyList">
      <div class="flex flex-col items-center justify-center py-20 text-gray-400">
        <i class="fas fa-spinner fa-spin text-4xl mb-3" style="color:var(--color-secondary);"></i>
        <p class="text-sm">Loading history...</p>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer class="py-4 px-4" style="background-color: var(--color-primary);">
  <div class="flex flex-col md:flex-row items-center justify-between gap-3">
    <div class="hidden md:block md:w-1/3"></div>
    <div class="text-center text-xs text-white/80">© 2026 TECHNILOG. All rights reserved.</div>
    <div class="flex justify-center md:justify-end gap-5 md:w-1/3">
      <a href="https://facebook.com" target="_blank" class="text-xl text-white hover:text-[var(--color-tertiary)] transition"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://instagram.com" target="_blank" class="text-xl text-white hover:text-[var(--color-tertiary)] transition"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://tiktok.com" target="_blank" class="text-xl text-white hover:text-[var(--color-tertiary)] transition"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </div>
</footer>

<!-- TOAST -->
<div id="toast" class="fixed bottom-6 right-6 z-[9999] text-white px-5 py-3 rounded-xl text-sm shadow-lg flex items-center gap-2 opacity-0 translate-y-20 transition-all duration-300 pointer-events-none" style="background:var(--color-primary);">
  <i class="fas fa-circle-check"></i><span id="toastMsg"></span>
</div>

<!-- ALERT DETAIL MODAL -->
<div id="alertModal" class="fixed inset-0 z-[9998] flex items-center justify-center p-4 hidden">
  <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
  <div class="relative w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-2xl shadow-2xl modal-in" id="alertModalPanel" onclick="event.stopPropagation()"></div>
</div>

<script>
  const _userId    = parseInt(localStorage.getItem('tl_user_id') || '0');
  const _userEmail = localStorage.getItem('tl_user_email') || '';
  let allHistory   = [];

  // ── Auto-open alert from URL param (?alert=ID) ───────────────────
  const _autoAlertId = new URLSearchParams(window.location.search).get('alert');

  // ── Clear badge as soon as this page is opened ───────────────────
  // Move all pending alert IDs into seen so the red badge disappears on main.html
  (function clearHistoryBadge() {
    const pending = JSON.parse(localStorage.getItem('tl_pending_alerts') || '[]');
    if (!pending.length) return;
    const seen = JSON.parse(localStorage.getItem('tl_seen_alerts') || '[]');
    pending.forEach(id => { if (!seen.includes(id)) seen.push(id); });
    localStorage.setItem('tl_seen_alerts', JSON.stringify(seen));
    localStorage.setItem('tl_pending_alerts', '[]');
  })();

  async function loadHistory() {
    if (!_userId && !_userEmail) { showEmpty('Please log in to view your device history.', 'fa-lock'); return; }
    document.getElementById('historyList').innerHTML = `
      <div class="flex flex-col items-center justify-center py-20 text-gray-400">
        <i class="fas fa-spinner fa-spin text-4xl mb-3" style="color:var(--color-secondary);"></i>
        <p class="text-sm">Loading history...</p>
      </div>`;
    try {
      const res  = await fetch(`../backend/device_history.php?user_id=${encodeURIComponent(_userId)}`);
      const data = await res.json();
      allHistory = data.data || [];
      renderSummary();
      applyFilters();

      // Auto-open if navigated from alert banner
      if (_autoAlertId) {
        const idx = allHistory.findIndex(h => String(h.id) === String(_autoAlertId));
        if (idx !== -1) {
          openAlertModal(idx);
        }
        // Clear URL param without reloading
        history.replaceState(null, '', window.location.pathname);
      }
    } catch(err) {
      console.error(err);
      showEmpty('Failed to load history. Please try again.', 'fa-circle-exclamation');
    }
  }

  function renderSummary() {
    const bar  = document.getElementById('summaryBar');
    const total = allHistory.length;
    const offs  = allHistory.filter(h => h.action === 'turned_off').length;
    const ons   = allHistory.filter(h => h.action === 'turned_on' && !isAlertEntry(h)).length;
    const fires = allHistory.filter(h => isFireEntry(h)).length;
    const burgs = allHistory.filter(h => isBurglarEntry(h)).length;
    if (!total) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    bar.innerHTML = `
      ${chip('fa-list','Total Events', total, '#6366f1')}
      ${chip('fa-power-off','Turned Off', offs, '#ef4444')}
      ${chip('fa-circle-check','Turned On', ons, '#22c55e')}
      ${fires ? chip('fa-fire','Fire Alerts', fires, '#dc2626') : ''}
      ${burgs ? chip('fa-person-falling-burst','Burglar Alerts', burgs, '#d97706') : ''}`;
  }

  function chip(icon, label, count, color) {
    return `<div class="bg-white rounded-xl px-4 py-2 flex items-center gap-2 text-xs font-bold text-gray-700 shadow-sm">
      <i class="fas ${icon}" style="color:${color};"></i>${count} ${label}</div>`;
  }

  function isFireEntry(h) {
    return h.action === 'alert_fire'
      || (h.category === 'Smart Fire Alarm' && h.note && h.note.toLowerCase().includes('fire alert'));
  }
  function isBurglarEntry(h) {
    return h.action === 'alert_burglar'
      || (h.category === 'Smart CCTV Camera' && h.note && h.note.toLowerCase().includes('burglar'));
  }
  function isAlertEntry(h) { return isFireEntry(h) || isBurglarEntry(h); }

  function applyFilters() {
    const q      = document.getElementById('searchInput').value.toLowerCase();
    const action = document.getElementById('actionFilter').value;
    const cat    = document.getElementById('catFilter').value;
    const filtered = allHistory.filter(h => {
      const matchQ   = !q || h.model_no.toLowerCase().includes(q) || h.device_model.toLowerCase().includes(q) || h.category.toLowerCase().includes(q);
      const matchCat = !cat || h.category === cat;
      let matchAct = true;
      if (action === 'alert_fire')     matchAct = isFireEntry(h);
      else if (action === 'alert_burglar') matchAct = isBurglarEntry(h);
      else if (action)                 matchAct = h.action === action && !isAlertEntry(h);
      return matchQ && matchAct && matchCat;
    });
    renderHistory(filtered);
  }

  function renderHistory(list) {
    const el = document.getElementById('historyList');
    if (!list.length) {
      showEmpty(allHistory.length === 0
        ? 'No device history yet.<br><span class="text-xs">Actions will appear here when you turn a device on or off.</span>'
        : 'No events match your filters.', 'fa-clock-rotate-left');
      return;
    }
    const groups = {};
    for (const h of list) {
      const day = new Date(h.actioned_at.replace(' ','T')).toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'});
      if (!groups[day]) groups[day] = [];
      groups[day].push(h);
    }
    el.innerHTML = Object.entries(groups).map(([day, items], gi) => `
      <div class="fade-in mb-6" style="animation-delay:${gi*60}ms;">
        <div class="flex items-center gap-3 mb-3">
          <div class="text-xs font-extrabold uppercase tracking-widest text-gray-400">${day}</div>
          <div class="flex-1 h-px bg-gray-200"></div>
          <div class="text-xs text-gray-400">${items.length} event${items.length!==1?'s':''}</div>
        </div>
        <div class="flex flex-col gap-3">${items.map((h,i) => historyRow(h,i)).join('')}</div>
      </div>`).join('');
  }

  function historyRow(h, i) {
    const isFire    = isFireEntry(h);
    const isBurglar = isBurglarEntry(h);
    const isAlert   = isFire || isBurglar;
    const isOff     = h.action === 'turned_off';
    const isCctv    = h.category === 'Smart CCTV Camera';
    const catIcon   = isCctv ? 'fa-camera' : 'fa-fire-flame-curved';
    const time      = new Date(h.actioned_at.replace(' ','T')).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit',hour12:true});

    if (isAlert) {
      const idx      = allHistory.indexOf(h);
      const dotBg    = isFire ? 'bg-red-500' : 'bg-amber-500';
      const divider  = isFire ? 'bg-red-200' : 'bg-amber-200';
      const border   = isFire ? 'border-red-200' : 'border-amber-200';
      const badgeCls = isFire ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700';
      const linkCls  = isFire ? 'text-red-500' : 'text-amber-500';
      const icon     = isFire ? '🔥' : '🚨';
      const label    = isFire ? 'Fire Alert' : 'Burglar Alert';
      return `
        <div class="flex gap-3 fade-in" style="animation-delay:${i*40}ms;">
          <div class="flex flex-col items-center">
            <div class="w-3 h-3 rounded-full border-2 border-white shadow flex-shrink-0 mt-1 ${dotBg}"></div>
            <div class="w-px flex-1 mt-1 ${divider}"></div>
          </div>
          <div class="flex-1 bg-white rounded-2xl shadow-sm p-4 mb-1 border ${border} hover:shadow-md transition-shadow cursor-pointer"
               onclick="openAlertModal(${idx})">
            <div class="flex items-start justify-between gap-2 flex-wrap">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="inline-flex items-center gap-1.5 text-[10px] font-extrabold uppercase tracking-wide px-2.5 py-1 rounded-full ${badgeCls}">
                  ${icon} ${label}
                </span>
                <span class="text-[10px] font-bold px-2 py-1 rounded-full bg-gray-100 text-gray-500 flex items-center gap-1">
                  <i class="fas ${catIcon} text-[8px]"></i>${escH(h.category)}
                </span>
              </div>
              <div class="flex items-center gap-2 flex-shrink-0">
                <span class="text-xs text-gray-400 font-medium">${time}</span>
                <span class="text-[10px] font-semibold ${linkCls} flex items-center gap-1">
                  View details <i class="fas fa-chevron-right text-[8px]"></i>
                </span>
              </div>
            </div>
            <div class="mt-2.5">
              <div class="font-extrabold text-gray-800 text-sm leading-snug">${escH(h.device_model)}</div>
              <div class="text-xs text-gray-400 mt-0.5">
                <span class="font-semibold text-gray-500">Model No.:</span> ${escH(h.model_no)}
                <span class="mx-1.5 text-gray-200">·</span>
                <span class="font-semibold text-gray-500">Order:</span> ${escH(h.order_ref)}
              </div>
            </div>
          </div>
        </div>`;
    }

    const actionBadge = isOff
      ? `<span class="inline-flex items-center gap-1 text-[10px] font-extrabold uppercase tracking-wide px-2.5 py-1 rounded-full bg-red-100 text-red-600"><i class="fas fa-power-off text-[8px]"></i>Turned Off</span>`
      : `<span class="inline-flex items-center gap-1 text-[10px] font-extrabold uppercase tracking-wide px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700"><i class="fas fa-power-off text-[8px]"></i>Turned On</span>`;
    const dot = isOff
      ? `<div class="w-3 h-3 rounded-full bg-red-400 border-2 border-white shadow flex-shrink-0 mt-1"></div>`
      : `<div class="w-3 h-3 rounded-full bg-emerald-400 border-2 border-white shadow flex-shrink-0 mt-1 pulse-dot"></div>`;
    return `
      <div class="flex gap-3 fade-in" style="animation-delay:${i*40}ms;">
        <div class="flex flex-col items-center">${dot}<div class="w-px flex-1 bg-gray-200 mt-1"></div></div>
        <div class="flex-1 bg-white rounded-2xl shadow-sm p-4 mb-1 border border-gray-100 hover:shadow-md transition-shadow">
          <div class="flex items-start justify-between gap-2 flex-wrap">
            <div class="flex items-center gap-2 flex-wrap">
              ${actionBadge}
              <span class="text-[10px] font-bold px-2 py-1 rounded-full bg-gray-100 text-gray-500 flex items-center gap-1">
                <i class="fas ${catIcon} text-[8px]"></i>${escH(h.category)}
              </span>
            </div>
            <span class="text-xs text-gray-400 font-medium flex-shrink-0">${time}</span>
          </div>
          <div class="mt-2.5">
            <div class="font-extrabold text-gray-800 text-sm leading-snug">${escH(h.device_model)}</div>
            <div class="text-xs text-gray-400 mt-0.5">
              <span class="font-semibold text-gray-500">Model No.:</span> ${escH(h.model_no)}
              <span class="mx-1.5 text-gray-200">·</span>
              <span class="font-semibold text-gray-500">Order:</span> ${escH(h.order_ref)}
            </div>
            ${h.note ? `<div class="mt-1.5 text-xs text-gray-400 italic">${escH(h.note)}</div>` : ''}
          </div>
        </div>
      </div>`;
  }

  // ── Alert Modal (mirrors the email) ──────────────────────
  function openAlertModal(idx) {
    const h      = allHistory[idx];
    const isFire = isFireEntry(h);
    const time   = new Date(h.actioned_at.replace(' ','T')).toLocaleString('en-PH',{
      year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true
    });

    const alertColor = isFire ? '#dc2626' : '#d97706';
    const alertBg    = isFire ? '#fff1f2' : '#fffbeb';
    const alertIcon  = isFire ? '🔥' : '🚨';
    const alertTitle = isFire ? 'FIRE ALERT TRIGGERED' : 'BURGLAR ALERT TRIGGERED';
    const alertDesc  = isFire
      ? 'Smoke or fire has been detected by your device. Please evacuate immediately and contact emergency services if needed.'
      : 'Unauthorized movement has been detected by your CCTV camera. Please check your premises and contact authorities if necessary.';

    const tips = isFire
      ? ['Evacuate all occupants immediately','Call <strong>911</strong> or your local fire department','Do not re-enter the building until cleared','Use the nearest fire exit']
      : ['Do <strong>NOT</strong> confront the intruder','Call <strong>911</strong> or your local police','Stay in a safe location','Review your CCTV footage as evidence'];

    const sensorRows = isFire ? [
      ['Temperature',  '72.4 °C  ⚠️ DANGER',    '#ef4444'],
      ['Smoke Level',  'HIGH — Smoke Detected',  '#f59e0b'],
      ['CO₂ Level',   '1847 ppm  ⚠️ CRITICAL', '#f59e0b'],
      ['Humidity',     '84.2 %',                 '#d1d5db'],
    ] : [
      ['Motion Zone',   'Zone A — Main Entrance','#f59e0b'],
      ['Reason',        'Rapid motion detected', '#ef4444'],
      ['Frame Anomaly', '3.2 fps (abnormal)',    '#f59e0b'],
      ['Signal',        '92%',                   '#d1d5db'],
    ];

    const tipColor = isFire ? '#7f1d1d' : '#78350f';
    const tipBg    = isFire ? '#fef2f2' : '#fffbeb';

    document.getElementById('alertModalPanel').innerHTML = `
      <div style="background:#1a1a2e;border-radius:16px;overflow:hidden;font-family:Arial,sans-serif;">

        <!-- Top bar -->
        <div style="background:#12122a;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <img src="../image/logo.png" style="height:28px;border-radius:50%;">
            <div>
              <div style="color:#fff;font-weight:900;font-size:13px;letter-spacing:3px;">TECHNILOG</div>
              <div style="color:#6b7280;font-size:10px;">Smart Security Alert System</div>
            </div>
          </div>
          <button onclick="closeModal()" style="background:none;border:none;cursor:pointer;color:#9ca3af;font-size:18px;padding:4px 8px;border-radius:8px;" onmouseover="this.style.background='rgba(255,255,255,.1)'" onmouseout="this.style.background='none'">
            <i class="fas fa-xmark"></i>
          </button>
        </div>

        <!-- Alert banner -->
        <div style="margin:20px 20px 16px;background:${alertBg};border-radius:12px;padding:20px 24px;border-left:5px solid ${alertColor};">
          <div style="font-size:30px;margin-bottom:8px;">${alertIcon}</div>
          <div style="color:${alertColor};font-size:17px;font-weight:900;margin-bottom:8px;letter-spacing:1px;">${alertTitle}</div>
          <div style="color:#374151;font-size:13px;line-height:1.6;">${alertDesc}</div>
        </div>

        <!-- Device info -->
        <div style="margin:0 20px 16px;background:#252547;border-radius:12px;padding:16px 20px;">
          <div style="color:#9ca3af;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">Device Information</div>
          <table style="width:100%;border-collapse:collapse;">
            ${[['Device', escH(h.device_model)],['Model No.', escH(h.model_no)],['Order Ref', escH(h.order_ref)],['Time Detected', time]].map(([l,v])=>`
            <tr>
              <td style="color:#9ca3af;font-size:12px;padding:5px 0;">${l}</td>
              <td style="color:#fff;font-size:12px;font-weight:700;text-align:right;">${v}</td>
            </tr>`).join('')}
            <tr><td colspan="2" style="padding:6px 0 2px;"><div style="border-top:1px solid #3a3a5c;"></div></td></tr>
            ${sensorRows.map(([l,v,c])=>`
            <tr>
              <td style="color:#9ca3af;font-size:12px;padding:5px 0;">${l}</td>
              <td style="color:${c};font-size:12px;font-weight:700;text-align:right;">${v}</td>
            </tr>`).join('')}
          </table>
        </div>

        <!-- What to do -->
        <div style="margin:0 20px 16px;background:${tipBg};border-radius:12px;padding:16px 20px;">
          <div style="color:${tipColor};font-size:13px;font-weight:700;margin-bottom:8px;">What to do:</div>
          <ul style="color:${tipColor};font-size:13px;margin:0;padding-left:18px;line-height:2;">
            ${tips.map(t=>`<li>${t}</li>`).join('')}
          </ul>
        </div>

        <!-- Test note -->
        <div style="margin:0 20px 20px;background:#252547;border-radius:12px;padding:12px 16px;text-align:center;">
          <p style="color:#9ca3af;font-size:11px;margin:0;line-height:1.6;">
            ⚠️ This is a <strong style="color:#fff;">TEST ALERT</strong> triggered manually from your Technilog device panel.<br>
            In a real emergency, this alert fires automatically.
          </p>
        </div>

        <!-- Footer -->
        <div style="text-align:center;color:#4b5563;font-size:11px;padding-bottom:20px;">© 2026 TECHNILOG. All rights reserved.</div>
      </div>`;

    document.getElementById('alertModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('alertModal').classList.add('hidden');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  function showEmpty(msg, icon='fa-clock-rotate-left') {
    document.getElementById('historyList').innerHTML = `
      <div class="flex flex-col items-center justify-center py-20 text-gray-400">
        <i class="fas ${icon} text-5xl mb-4" style="color:var(--color-secondary);opacity:.4;"></i>
        <p class="text-sm text-center">${msg}</p>
      </div>`;
  }

  function escH(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadHistory();
</script>
</body>
</html>
