<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Technilog</title>
  <link rel="stylesheet" href="../stylesheet/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f8f9fb; min-height: 100vh; }

    /* Search bar suggestion dropdown */
    #suggestBox {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(46,39,157,0.18);
      z-index: 999;
      overflow: hidden;
      display: none;
    }
    #suggestBox.open { display: block; }
    .suggest-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      transition: background .15s;
    }
    .suggest-item:last-child { border: none; }
    .suggest-item:hover { background: #f0f4ff; }
    .suggest-img {
      width: 40px; height: 40px; border-radius: 8px;
      object-fit: cover; background: #e5e7eb; flex-shrink: 0;
    }
    .suggest-placeholder {
      width: 40px; height: 40px; border-radius: 8px;
      background: #e5e7eb; display: flex; align-items: center;
      justify-content: center; color: #9ca3af; font-size: 1rem; flex-shrink: 0;
    }
    .suggest-name { font-size: .85rem; font-weight: 700; color: #1f2937; }
    .suggest-cat  { font-size: .72rem; color: #6b7280; }
    .suggest-price { font-size: .82rem; font-weight: 700; color: #2E279D; margin-left: auto; flex-shrink: 0; }

    .suggest-footer {
      padding: 9px 14px; background: #f8faff;
      font-size: .8rem; color: #4D80E4; font-weight: 700;
      cursor: pointer; text-align: center; transition: background .15s;
    }
    .suggest-footer:hover { background: #ede9fe; }

    /* Product cards */
    .product-card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      overflow: hidden; cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      display: flex; flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(46,39,157,0.15);
    }
    .card-img { width: 100%; height: 180px; object-fit: cover; background: #e5e7eb; }
    .card-img-ph {
      width: 100%; height: 180px; background: #f3f4f6;
      display: flex; align-items: center; justify-content: center;
      color: #9ca3af; font-size: 2.5rem;
    }

    /* Highlight matched text */
    mark { background: #dbeafe; color: #1d4ed8; border-radius: 3px; padding: 0 2px; }

    /* Skeleton loader */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="fixed top-0 left-0 w-full z-50 shadow-md" style="background:var(--color-primary);">
  <div class="max-w-7xl mx-auto flex items-center h-[64px] px-4 gap-4">
    <a href="main.html" class="flex items-center gap-2 flex-shrink-0">
      <img src="../image/logo.png" alt="Logo" class="h-10 rounded-full">
      <span class="text-white font-bold text-lg tracking-wide hidden sm:block">TECHNILOG</span>
    </a>

    <!-- Search bar with dropdown -->
    <div class="flex-1 relative" id="searchWrap">
      <div class="flex items-center bg-white rounded-lg overflow-hidden">
        <input
          id="searchInput"
          type="text"
          placeholder="Search products..."
          class="flex-1 px-4 py-2 outline-none text-gray-800 text-sm bg-transparent"
          autocomplete="off"
        >
        <button id="searchBtn" class="px-4 py-2 text-gray-400 hover:text-[var(--color-primary)] transition">
          <i class="fas fa-search"></i>
        </button>
      </div>
      <div id="suggestBox"></div>
    </div>

    <a href="main.html" class="text-white/80 hover:text-white text-sm transition flex-shrink-0">
      <i class="fas fa-arrow-left mr-1"></i><span class="hidden sm:inline">Back to Homepage</span>
    </a>
  </div>
</header>

<div class="h-[64px]"></div>

<!-- MAIN CONTENT -->
<div class="max-w-7xl mx-auto px-4 py-8">

  <!-- Search meta -->
  <div class="mb-6">
    <h1 id="resultHeading" class="text-2xl font-extrabold text-gray-800"></h1>
    <p id="resultSub" class="text-gray-400 text-sm mt-1"></p>
  </div>

  <!-- Results grid -->
  <div id="resultsGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>

  <!-- Empty state -->
  <div id="emptyState" class="hidden text-center py-24">
    <div class="text-6xl mb-4">🔍</div>
    <h2 class="text-xl font-bold text-gray-700 mb-2">No products found</h2>
    <p id="emptyMsg" class="text-gray-400 text-sm mb-6"></p>
    <a href="main.html" class="inline-block px-6 py-3 rounded-xl text-white font-bold text-sm transition"
       style="background:var(--color-primary);">
      <i class="fas fa-store mr-2"></i>Browse All Products
    </a>
  </div>

</div>

<script>
const BACKEND = '../backend/search_products.php';

// ── Read query from URL ─────────────────────────────────────────
const params      = new URLSearchParams(window.location.search);
let   currentQuery = params.get('q') || '';

const searchInput  = document.getElementById('searchInput');
const suggestBox   = document.getElementById('suggestBox');
const resultsGrid  = document.getElementById('resultsGrid');
const emptyState   = document.getElementById('emptyState');
const resultHeading = document.getElementById('resultHeading');
const resultSub    = document.getElementById('resultSub');

searchInput.value = currentQuery;

// ── Highlight helper ────────────────────────────────────────────
function highlight(text, query) {
  if (!query) return escH(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escH(text).replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}
function escH(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtPrice(n) {
  return '₱' + parseFloat(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2 });
}

// ── Skeleton loader ─────────────────────────────────────────────
function showSkeleton() {
  resultsGrid.innerHTML = Array(8).fill(`
    <div class="product-card">
      <div class="skeleton" style="height:180px;border-radius:0;"></div>
      <div class="p-3 flex flex-col gap-2">
        <div class="skeleton h-3 w-2/3 rounded"></div>
        <div class="skeleton h-4 w-full rounded"></div>
        <div class="skeleton h-3 w-1/2 rounded"></div>
        <div class="skeleton h-5 w-1/3 rounded mt-1"></div>
      </div>
    </div>`).join('');
  emptyState.classList.add('hidden');
}

// ── Full search results ─────────────────────────────────────────
async function doSearch(q) {
  if (!q.trim()) {
    window.location.href = 'main.html';
    return;
  }

  // Update URL without reload
  history.replaceState({}, '', `search.html?q=${encodeURIComponent(q)}`);
  currentQuery = q;
  searchInput.value = q;

  resultHeading.textContent = `Results for "${q}"`;
  resultSub.textContent = 'Searching…';
  showSkeleton();
  hideSuggest();

  try {
    const res  = await fetch(`${BACKEND}?mode=full&q=${encodeURIComponent(q)}`);
    const data = await res.json();

    if (!data.success || !data.data.length) {
      resultsGrid.innerHTML = '';
      emptyState.classList.remove('hidden');
      document.getElementById('emptyMsg').textContent =
        `We couldn't find any products matching "${q}". Try a different keyword.`;
      resultHeading.textContent = `No results for "${q}"`;
      resultSub.textContent = '';
      return;
    }

    resultSub.textContent = `${data.total} product${data.total !== 1 ? 's' : ''} found`;
    emptyState.classList.add('hidden');
    renderCards(data.data, q);
  } catch (e) {
    resultsGrid.innerHTML = '<p class="col-span-full text-center text-gray-400 py-10">Cannot reach server.</p>';
  }
}

function renderCards(products, q) {
  resultsGrid.innerHTML = products.map(p => {
    const imgEl = p.image
      ? `<img class="card-img" src="${escH(p.image)}" alt="${escH(p.name)}"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
         <div class="card-img-ph" style="display:none;"><i class="fas fa-image"></i></div>`
      : `<div class="card-img-ph"><i class="fas fa-image"></i></div>`;
    return `
      <div class="product-card" onclick="goToProduct(${p.id})">
        ${imgEl}
        <div class="p-3 flex flex-col flex-1">
          <div class="text-xs font-semibold uppercase tracking-wide mb-1" style="color:var(--color-secondary);">
            ${highlight(p.category, q)}
          </div>
          <div class="font-bold text-gray-800 text-sm leading-snug mb-1">
            ${highlight(p.name, q)}
          </div>
          <div class="text-xs text-gray-400 flex-1 line-clamp-2">
            ${highlight((p.description || '').substring(0, 80), q)}${p.description?.length > 80 ? '…' : ''}
          </div>
          <div class="font-bold mt-2 text-sm" style="color:var(--color-primary);">
            ${fmtPrice(p.min_price)}
          </div>
        </div>
        <div class="px-3 pb-3">
          <button class="w-full py-2 rounded-lg text-white text-xs font-bold transition"
            style="background:var(--color-primary);" onclick="event.stopPropagation();goToProduct(${p.id})">
            <i class="fas fa-eye mr-1"></i>View Product
          </button>
        </div>
      </div>`;
  }).join('');
}

function goToProduct(id) {
  window.location.href = `product.html?id=${id}`;
}

// ── Live suggestions dropdown ───────────────────────────────────
let suggestTimer = null;
let lastSuggestQ = '';

function hideSuggest() {
  suggestBox.classList.remove('open');
  suggestBox.innerHTML = '';
}

async function fetchSuggestions(q) {
  if (q.length < 1) { hideSuggest(); return; }
  if (q === lastSuggestQ) return;
  lastSuggestQ = q;

  try {
    const res  = await fetch(`${BACKEND}?mode=suggest&q=${encodeURIComponent(q)}`);
    const data = await res.json();

    if (!data.success || !data.data.length) {
      // Show "no match" hint
      suggestBox.innerHTML = `
        <div class="suggest-item" style="cursor:default;">
          <div class="suggest-placeholder"><i class="fas fa-search"></i></div>
          <div>
            <div class="suggest-name text-gray-400">No products found</div>
            <div class="suggest-cat">Try a different keyword</div>
          </div>
        </div>`;
      suggestBox.classList.add('open');
      return;
    }

    suggestBox.innerHTML =
      data.data.map(p => {
        const imgEl = p.image
          ? `<img class="suggest-img" src="${escH(p.image)}" alt="${escH(p.name)}"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
             <div class="suggest-placeholder" style="display:none;"><i class="fas fa-image"></i></div>`
          : `<div class="suggest-placeholder"><i class="fas fa-image"></i></div>`;
        return `
          <div class="suggest-item" onclick="goToProduct(${p.id})">
            ${imgEl}
            <div class="flex-1 min-w-0">
              <div class="suggest-name truncate">${highlight(p.name, q)}</div>
              <div class="suggest-cat">${escH(p.category)}</div>
            </div>
            <div class="suggest-price">${fmtPrice(p.min_price)}</div>
          </div>`;
      }).join('') +
      `<div class="suggest-footer" onclick="doSearch(searchInput.value)">
        <i class="fas fa-search mr-1"></i>See all results for "<strong>${escH(q)}</strong>"
      </div>`;

    suggestBox.classList.add('open');
  } catch(e) { hideSuggest(); }
}

searchInput.addEventListener('input', () => {
  clearTimeout(suggestTimer);
  const q = searchInput.value.trim();
  if (!q) { hideSuggest(); return; }
  suggestTimer = setTimeout(() => fetchSuggestions(q), 220);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const q = searchInput.value.trim();
    if (q) doSearch(q);
  }
  if (e.key === 'Escape') hideSuggest();
});

document.getElementById('searchBtn').addEventListener('click', () => {
  const q = searchInput.value.trim();
  if (q) doSearch(q);
});

// Close suggest when clicking outside
document.addEventListener('click', e => {
  if (!document.getElementById('searchWrap').contains(e.target)) hideSuggest();
});

// ── Run on page load ────────────────────────────────────────────
if (currentQuery) {
  doSearch(currentQuery);
} else {
  resultHeading.textContent = 'Search Products';
  resultSub.textContent = 'Type something above to find products.';
  resultsGrid.innerHTML = '';
}
</script>

<footer class="py-4 px-4" style="background-color: var(--color-primary);">
  <div class="flex flex-col md:flex-row items-center justify-between gap-3">
    <div class="hidden md:block md:w-1/3"></div>
    <div class="text-center text-xs text-white/80">© 2026 TECHNILOG. All rights reserved.</div>
    <div class="flex justify-center md:justify-end gap-5 md:w-1/3">
      <a href="https://facebook.com" target="_blank" class="text-xl text-white hover:text-[var(--color-tertiary)] transition"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://instagram.com" target="_blank" class="text-xl text-white hover:text-[var(--color-tertiary)] transition"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://tiktok.com" target="_blank" class="text-xl text-white hover:text-[var(--color-tertiary)] transition"><i class="fa-brands fa-tiktok"></i></a>
    </div>
  </div>
</footer>
</body>
</html>
